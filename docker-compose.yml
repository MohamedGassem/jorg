services:
  postgres:
    image: postgres:18.3
    container_name: jorg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jorg
      POSTGRES_PASSWORD: jorg_dev_password
      POSTGRES_DB: jorg
    ports:
      - "5432:5432"
    volumes:
      - jorg_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NOTE: PDF conversion uses `libreoffice --headless` as a subprocess inside
  # the backend container. For this to work, libreoffice-headless must be
  # installed in the backend image (e.g. via apt). This service entry is a
  # placeholder; activate it only if you run a separate conversion sidecar.
  libreoffice:
    image: linuxserver/libreoffice:latest
    container_name: jorg-libreoffice
    restart: unless-stopped
    profiles:
      - pdf

volumes:
  jorg_pgdata:
